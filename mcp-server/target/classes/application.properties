spring.application.name=mcp-server
server.port=9090

management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.com.rbs.customer.mcp.server=INFO

mcp.connectors.jira.enabled=false
mcp.connectors.jira.base-url=https://your-domain.atlassian.net
mcp.connectors.jira.email=your-email@company.com
mcp.connectors.jira.api-token=replace-me
mcp.connectors.jira.project-key=OBS

mcp.connectors.git.enabled=false
mcp.connectors.git.provider=github
mcp.connectors.git.repo=org/repo
mcp.connectors.git.api-token=replace-me

mcp.connectors.cloudwatch.enabled=false
mcp.connectors.cloudwatch.region=ap-south-1
mcp.connectors.cloudwatch.log-group=/aws/app/onboarding-service
mcp.connectors.cloudwatch.lookback-minutes=120
mcp.connectors.cloudwatch.limit=100

mcp.connectors.s3.enabled=false
mcp.connectors.s3.region=ap-south-1
mcp.connectors.s3.bucket=onboarding-observability-artifacts
mcp.connectors.s3.prefix=incidents/

mcp.connectors.figma.enabled=false
mcp.connectors.figma.api-token=replace-me
mcp.connectors.figma.file-key=replace-me
mcp.connectors.figma.project-name=Customer-Onboarding

mcp.connectors.database.enabled=false
mcp.connectors.database.jdbc-url=jdbc:postgresql://localhost:5432/onboarding
mcp.connectors.database.username=onboarding_user
mcp.connectors.database.password=onboarding_password
