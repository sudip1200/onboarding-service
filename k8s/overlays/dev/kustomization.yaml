apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# CI/CD sets these to ECR image URIs + tags.
images:
  - name: onboarding-service
    newName: REPLACE_ECR_ONBOARDING_IMAGE
    newTag: REPLACE_TAG
  - name: mcp-server
    newName: REPLACE_ECR_MCP_IMAGE
    newTag: REPLACE_TAG

