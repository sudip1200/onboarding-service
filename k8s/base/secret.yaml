apiVersion: v1
kind: Secret
metadata:
  name: onboarding-secrets
  namespace: onboarding
type: Opaque
stringData:
  # onboarding-service
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.onboarding.svc.cluster.local:5432/onboarding"
  SPRING_DATASOURCE_USERNAME: "onboarding_user"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"

  JIRA_ENABLED: "false"
  JIRA_BASE_URL: "https://your-domain.atlassian.net"
  JIRA_CLOUD_ID: ""
  JIRA_EMAIL: "your-email@company.com"
  JIRA_API_TOKEN: ""
  JIRA_PROJECT_KEY: "OBS"
  JIRA_ISSUE_TYPE: "Bug"
  JIRA_CREATE_ISSUE_PATH: "/rest/api/3/issue"

  # mcp-server
  MCP_JIRA_BASE_URL: "https://your-domain.atlassian.net"
  MCP_JIRA_CLOUD_ID: ""
  MCP_JIRA_EMAIL: "your-email@company.com"
  MCP_JIRA_API_TOKEN: ""
  MCP_JIRA_PROJECT_KEY: "OBS"
  MCP_JIRA_CREATE_ISSUE_PATH: "/rest/api/3/issue"
  MCP_JIRA_GET_ISSUE_PATH: "/rest/api/3/issue"

  MCP_LLM_API_KEY: ""
  MCP_LLM_BASE_URL: "https://api.openai.com"
  MCP_LLM_MODEL: "gpt-4o-mini"

