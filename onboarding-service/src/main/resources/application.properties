spring.application.name=onboarding-service
spring.profiles.default=in-memory
server.error.include-message=always
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
logging.level.root=INFO
logging.level.com.rbs.customer.onboarding.onboarding_service=INFO
incident.automation.jira-threshold=CRITICAL
integrations.jira.enabled=${JIRA_ENABLED:false}
integrations.jira.base-url=${JIRA_BASE_URL:https://your-domain.atlassian.net}
integrations.jira.cloud-id=${JIRA_CLOUD_ID:}
integrations.jira.email=${JIRA_EMAIL:your-email@company.com}
integrations.jira.api-token=${JIRA_API_TOKEN:}
integrations.jira.project-key=${JIRA_PROJECT_KEY:OBS}
integrations.jira.issue-type=${JIRA_ISSUE_TYPE:Bug}
integrations.jira.create-issue-path=${JIRA_CREATE_ISSUE_PATH:/rest/api/3/issue}
integrations.mcp.enabled=false
integrations.mcp.base-url=${MCP_BASE_URL:http://localhost:9090}
integrations.mcp.incident-path=${MCP_INCIDENT_PATH:/api/v1/incidents}
integrations.figma.enabled=false
integrations.figma.file-key=${FIGMA_FILE_KEY:}
integrations.figma.project-name=${FIGMA_PROJECT_NAME:}
server.port=8081
