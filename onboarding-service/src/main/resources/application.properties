spring.application.name=onboarding-service
spring.profiles.default=in-memory
server.error.include-message=always
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
logging.level.root=INFO
logging.level.com.rbs.customer.onboarding.onboarding_service=INFO
incident.automation.jira-threshold=CRITICAL
integrations.jira.enabled=false
integrations.jira.base-url=https://your-domain.atlassian.net
integrations.jira.email=your-email@company.com
integrations.jira.api-token=replace-me
integrations.jira.project-key=OBS
integrations.jira.issue-type=Bug
integrations.jira.create-issue-path=/rest/api/2/issue
integrations.mcp.enabled=false
integrations.mcp.base-url=http://localhost:9090
integrations.mcp.incident-path=/api/v1/incidents
integrations.figma.enabled=false
integrations.figma.file-key=
integrations.figma.project-name=
